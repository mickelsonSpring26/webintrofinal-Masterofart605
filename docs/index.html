<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Page</title>
    <script type="module" src="ui.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="mainPage">
    <nav id="navBar">
      <ul id="navList">
        <li id="logo" class="navButton">logo here</li>
        <a href="index.html" class="navButton"><li>Main</li></a>
        <a href="weapon.html" class="navButton"><li>Weapon list</li></a>
        <a href="create.html" class="navButton"
          ><li>Create your own list</li></a
        >
        <a href="display.html" class="navButton"><li>Display Page</li></a>
      </ul>
    </nav>
    <main id="mainSection">
      <aside id="pageDescription" class="big">
        <section id="signInSection"></section>
        <h3 id="title">Main Page</h3>
        <p id="description">
          This is the main page! It's the most important part of the site,
          because this is where you run the weapon generator
        </p>
        <div id="grow"></div>
        <button id="hideButton"><</button>
      </aside>
      <section id="pageContent">
        <form id="generatorForm">
          <div class="divider"></div>
          <label>
            Number of Players
            <br />
            <input type="number" name="" id="playerInput" />
          </label>
          <section id="radioSection">
            Use Kits
            <br />
            <label> <input type="radio" name="kits" id="kitsYes" />Yes </label>
            <label> <input type="radio" name="kits" id="kitsNo" />No </label>
          </section>
          <div class="divider"></div>
          <section id="buttonSection">
            <button type="submit">Generate</button>
            <br />
            <button type="reset">Clear</button>
          </section>
        </form>
        <section id="falseConsole"></section>
        <section id="singleDisplay"></section>
      </section>
    </main>
  </body>
</html>
